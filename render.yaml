services:
  - type: web
    name: billx-v2-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    branch: main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SSL
        value: "true"
